reuse_existing: true
up_to_date_sp_names: "configs/sp_name_correction.json"

filter_tools:
  blastp:
    reference_db: "data/char_2ODDs/blast_ref_db/2ODD_ref_db"

  diamond:
    reference_db: "data/char_2ODDs/dmnd_ref_db"  

  hmmer:
    domain_model: "data/char_2ODDs/2ODD_domain.hmm"

parameters:
  threads: 8
  thresholds_alignment:
    evalue: 1e-5
    pident: 15.0
    length: 80
    bitscore: 40
    num_hits: 100
  
  thresholds_hmmer:
    full_Evalue: 1e-5
    bestdom_Evalue: 1e-5
    full_score: 50
    bestdom_score: 50
    N: 1
  


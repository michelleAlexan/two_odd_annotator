reuse_existing: true # skip re-running BLAST or filtering if output files are already present
up_to_date_sp_names: "configs/up_to_date_species_name.yaml"
tools:
  blast:
    reference_db: "/Users/michellealexander/projects/two_odd_annotator/data/char_2ODDs/blast_ref_db/2ODD_ref_db"
    threads: 8
    thresholds:
      evalue: 1e-5
      pident: 15.0     # percent identity cutoff
      length: 80       # minimum alignment length
      bitscore: 40       # minimum bitscore
      num_hits: 100      # number of hits per query

  hmmer:
    domain_model: "/Users/michellealexander/projects/two_odd_annotator/data/char_2ODDs/2ODD_domain.hmm"
    

